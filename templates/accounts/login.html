{% extends 'base.html' %}
{% block title %}Login | KABAADWALA™{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4" style="background:#121212;">
                <h2 class="mb-4 text-center" style="color:#6BFF57;">Login</h2>
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" name="password" id="password" required>
                            <button type="button" class="btn btn-outline-secondary password-toggle" data-target="#password" tabindex="-1" style="border-top-left-radius:0;border-bottom-left-radius:0;border-color:#6BFF57;">
                                <i class="bi bi-eye" style="color:#ffffff;"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100" style="background:#6BFF57;color:#0B0B0F;">Login</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'accounts:password_reset' %}" style="color:#6BFF57;">Forgot password?</a>
                </div>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(function() {
    // Password visibility toggle
    $('.password-toggle').on('click', function() {
        var target = $($(this).data('target'));
        var icon = $(this).find('i');
        if (target.attr('type') === 'password') {
            target.attr('type', 'text');
            icon.removeClass('bi-eye').addClass('bi-eye-slash');
        } else {
            target.attr('type', 'password');
            icon.removeClass('bi-eye-slash').addClass('bi-eye');
        }
    });
});
</script>
{% endblock %}
