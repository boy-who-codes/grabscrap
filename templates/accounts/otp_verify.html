{% extends 'base.html' %}
{% block title %}Enter OTP - KABAADWALA™{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="card p-4 shadow-lg" style="max-width: 400px; width: 100%; background: #121212; color: #fff;">
    <h3 class="mb-3 text-center" style="color: #6BFF57;">Enter OTP</h3>
    <p class="text-center mb-2" style="color: #fff;">Account type: <span style="color: #6BFF57;">{{ account_type|title }}</span></p>
    <form method="post" autocomplete="off">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_otp_code" class="form-label">OTP Code</label>
        <input type="tel" name="otp_code" maxlength="6" class="form-control text-white" id="id_otp_code" placeholder="Enter 6-digit OTP" style="background:#18181C; color:#fff;" required autofocus inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code">
      </div>
      <button type="submit" class="btn btn-success w-100 mt-2">Verify OTP</button>
    </form>
    <div class="mt-3 text-center">
      <span style="color: #fff;">Didn't receive the OTP? Check your spam folder or <a href="/accounts/login/" class="text-success">login again</a>.</span>
    </div>
  </div>
</div>
{% endblock %}
