{% extends 'base.html' %}

{% block content %}
<div class="container my-4">
    <h1>Welcome to KABAADWALA™</h1>
    <p>Your hyperlocal scrap marketplace</p>
    
    {% if user.is_authenticated %}
        <div class="alert alert-success">
            You are logged in as {{ user.email }}
        </div>
        <a href="{% url 'dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
    {% else %}
        <div class="row">
            <div class="col-md-6">
                <a href="{% url 'signup' %}" class="btn btn-primary btn-block mb-2">Sign Up</a>
            </div>
            <div class="col-md-6">
                <a href="{% url 'login' %}" class="btn btn-secondary btn-block mb-2">Login</a>
            </div>
        </div>
    {% endif %}
</div>
{% endblock %}
