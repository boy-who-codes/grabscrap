{% extends 'dashboard/base_dashboard.html' %}
{% block content %}
<div class="container-fluid mt-4">
  <!-- Map Container -->
  <div id="admin-map" style="height: 60vh; width: 100%; border-radius: 8px; margin-bottom: 2rem;"></div>

  <!-- Dashboard Metrics -->
  <div class="row g-4">
    <!-- Users Card -->
    <div class="col-md-6 col-lg-3">
      <div class="card bg-dark text-white h-100 border-success">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-people-fill fs-1 text-success me-3"></i>
            <div>
              <h6 class="card-title mb-0">Total Users</h6>
              <h2 class="mb-0">{{ total_users }}</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vendors Card -->
    <div class="col-md-6 col-lg-3">
      <div class="card bg-dark text-white h-100 border-info">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-shop fs-1 text-info me-3"></i>
            <div>
              <h6 class="card-title mb-0">Active Vendors</h6>
              <h2 class="mb-0">{{ total_vendors }}</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Locations Card -->
    <div class="col-md-6 col-lg-3">
      <div class="card bg-dark text-white h-100 border-warning">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-geo-alt-fill fs-1 text-warning me-3"></i>
            <div>
              <h6 class="card-title mb-0">Service Locations</h6>
              <h2 class="mb-0">{{ total_locations }}</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- KYC Card -->
    <div class="col-md-6 col-lg-3">
      <div class="card bg-dark text-white h-100 border-danger">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-file-earmark-check fs-1 text-danger me-3"></i>
            <div>
              <h6 class="card-title mb-0">Pending KYC</h6>
              <h2 class="mb-0">{{ pending_kyc }}</h2>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="row mt-4">
    <div class="col-12">
      <div class="card bg-dark text-white border-success">
        <div class="card-body">
          <h5 class="card-title text-success mb-4">Quick Actions</h5>
          <div class="row g-3">
            <div class="col-md-3">
              <a href="{% url 'kyc_management:pending_list' %}" class="btn btn-warning w-100">
                <i class="bi bi-file-earmark-check me-2"></i>Review KYC
              </a>
            </div>
            <div class="col-md-3">
              <a href="{% url 'products:admin_location_list' %}" class="btn btn-info w-100">
                <i class="bi bi-geo-alt me-2"></i>Manage Locations
              </a>
            </div>
            <div class="col-md-3">
              <a href="{% url 'products:admin_location_create' %}" class="btn btn-success w-100">
                <i class="bi bi-plus-circle me-2"></i>Add Location
              </a>
            </div>
            <div class="col-md-3">
              <a href="{% url 'admin:index' %}" class="btn btn-primary w-100">
                <i class="bi bi-gear me-2"></i>Admin Panel
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
