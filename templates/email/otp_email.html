<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Your KABAADWALA™ OTP</title>
  <style>
    body { background: #0B0B0F; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
    .container { background: #121212; border-radius: 16px; max-width: 420px; margin: 40px auto; padding: 32px 24px; box-shadow: 0 2px 16px rgba(0,0,0,0.18); }
    .otp { color: #6BFF57; font-size: 2.2rem; font-weight: bold; letter-spacing: 4px; margin: 18px 0; }
    .footer { color: #C7C7C7; font-size: 0.95rem; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="color:#6BFF57; margin-bottom: 0.5em;">Your Login OTP</h2>
    <p>Hello {{ user.full_name|default:user.email }},</p>
    <p>Use the following OTP to complete your login to <b>KABAADWALA™</b>:</p>
    <div class="otp">{{ otp_code }}</div>
    <p style="margin-top:2em;">This OTP is valid for 10 minutes. If you did not request this, please ignore this email.</p>
    <div class="footer">&copy; 2024 KABAADWALA™ Scrap Marketplace</div>
  </div>
</body>
</html>
