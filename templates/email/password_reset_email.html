<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset Request</title>
    <style>
        body { background: #0B0B0F; color: #FFFFFF; font-family: Arial, sans-serif; }
        .container { background: #121212; padding: 2rem; border-radius: 8px; max-width: 500px; margin: 2rem auto; }
        .btn { background: #6BFF57; color: #0B0B0F; padding: 0.75rem 1.5rem; border-radius: 4px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Password Reset</h2>
        <p>Click the button below to reset your password:</p>
        <p><a href="{{ reset_link }}" class="btn">Reset Password</a></p>
        <p>If you did not request a password reset, you can ignore this email.</p>
    </div>
</body>
</html>
