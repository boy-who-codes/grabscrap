<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KABAADWALA™{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0B0B0F; color: #FFFFFF; }
        .navbar, .footer { background: #121212; }
        .nav-link, .footer { color: #C7C7C7 !important; }
        .nav-link.active, .nav-link:hover { color: #6BFF57 !important; }
        .brand { color: #6BFF57; font-weight: bold; letter-spacing: 1px; }
        .card { background: #121212; color: #FFFFFF; border-radius: 18px; box-shadow: 0 2px 16px rgba(0,0,0,0.18); }
        .form-label, .form-check-label, .input-group-text { color: #C7C7C7; }
        .form-control, .form-select { background: #18181C; color: #FFFFFF; border: 1px solid #23232A; }
        .form-control:focus, .form-select:focus { background: #18181C; color: #FFFFFF; border-color: #6BFF57; box-shadow: 0 0 0 0.2rem rgba(107,255,87,0.15); }
        .form-control::placeholder { color: #888888; }
        .btn-success, .btn-success:active, .btn-success:focus, .btn-success:hover {
            background: #6BFF57 !important;
            color: #0B0B0F !important;
            border: none;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(107,255,87,0.08);
        }
        .btn, .btn * { font-weight: 600; letter-spacing: 0.5px; }
        .btn:disabled, .btn.disabled { opacity: 0.7; }
        .card h2, .card h3, .card h4, .card h5 { color: #6BFF57; }
        .footer { color: #C7C7C7 !important; border-top: 1px solid #23232A; }
        .alert { border-radius: 12px; }
        .alert .btn-close {
            filter: invert(1) grayscale(1) brightness(2);
            opacity: 0.8;
        }
        .alert .btn-close:hover {
            opacity: 1;
        }
        @media (max-width: 576px) {
            .card { border-radius: 10px; }
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="border-radius: 12px; font-size: 1.05rem;">
                    <i class="bi bi-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}exclamation-circle{% elif message.tags == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}" style="margin-right: 8px;"></i>
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>
    {% block content %}{% endblock %}
    <footer class="footer text-center mt-5 py-3">
        &copy; 2024 KABAADWALA™ Scrap Marketplace. All rights reserved.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Optional: Clear alerts/messages on page refresh
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            document.querySelectorAll('.alert').forEach(function(alert) {
                alert.remove();
            });
        }
    });
    </script>
</body>
</html>
